name: Generate Blog Post

on:
  schedule:
    # 7 AM UTC on Monday, Wednesday, Friday
    - cron: "0 7 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@tryfigures.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-generate blog post $(date +%Y-%m-%d)"
          git push
